<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>방문고객 기록 v16</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#f4f6fb;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
    .wrap{max-width:960px;margin:0 auto;padding:18px 14px 40px}
    header{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    h1{margin:0 0 6px;font-size:25px;letter-spacing:-.04em}
    p{margin:0;color:#667085;font-size:14px;line-height:1.45}
    .branch{display:inline-block;margin-bottom:8px;padding:7px 11px;border-radius:999px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-weight:900;font-size:13px}
    .mode{white-space:nowrap;border-radius:999px;padding:9px 12px;background:#eff6ff;color:#1d4ed8;font-size:13px;font-weight:900}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:22px;box-shadow:0 10px 24px rgba(16,24,40,.07);padding:16px;margin-bottom:12px}
    .main-btn{width:100%;border:0;border-radius:20px;padding:24px 12px;background:#2563eb;color:#fff;font-size:24px;font-weight:950;cursor:pointer;box-shadow:0 14px 26px rgba(37,99,235,.22)}
    .btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
    button{font:inherit}
    .btn{border:1px solid #d0d5dd;background:#fff;color:#344054;border-radius:14px;padding:11px 9px;font-size:13px;font-weight:850;cursor:pointer}
    .danger{background:#fff5f5;border-color:#fecaca;color:#b42318}
    .success{background:#f0fdf4;border-color:#bbf7d0;color:#15803d}
    .dark{background:#111827;color:#fff;border-color:#111827}
    button:disabled{opacity:.55;cursor:not-allowed}
    .status{margin-top:10px;border-radius:14px;padding:11px 12px;background:#f8fafc;border:1px solid #e5e7eb;color:#475467;font-size:13px;font-weight:750;line-height:1.45;white-space:pre-wrap}
    .status.ok{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
    .status.warn{background:#fffbeb;border-color:#fde68a;color:#92400e}
    .status.err{background:#fff5f5;border-color:#fecaca;color:#991b1b}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .stat{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:13px}
    .stat small{display:block;color:#667085;font-size:12px;font-weight:800;margin-bottom:5px}
    .stat strong{font-size:25px;letter-spacing:-.04em}
    .head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}
    h2{margin:0;font-size:18px;letter-spacing:-.04em}
    .badge{background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900}
    .list{display:flex;flex-direction:column;gap:9px}
    .row{border:1px solid #e5e7eb;border-radius:16px;padding:12px;background:#fff;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
    .row b{display:block;margin-bottom:4px}
    .row span{display:block;color:#667085;font-size:13px;line-height:1.45}
    .empty{border:1px dashed #cbd5e1;background:#f8fafc;color:#64748b;border-radius:16px;padding:20px;text-align:center;font-weight:800}
    .mini{width:100%;border-collapse:separate;border-spacing:0 7px}
    .mini th{text-align:left;color:#667085;font-size:12px;padding:0 8px}
    .mini td{background:#f8fafc;border-top:1px solid #eef2f7;border-bottom:1px solid #eef2f7;padding:9px 8px;font-size:13px;font-weight:750}
    .mini td:first-child{border-left:1px solid #eef2f7;border-radius:10px 0 0 10px}
    .mini td:last-child{border-right:1px solid #eef2f7;border-radius:0 10px 10px 0;text-align:right}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    dialog{width:min(620px,calc(100% - 22px));border:0;border-radius:22px;padding:0;box-shadow:0 30px 80px rgba(0,0,0,.28)}
    dialog::backdrop{background:rgba(15,23,42,.42)}
    .modal{padding:16px}
    .modal h3{margin:0 0 4px;font-size:21px}
    label{display:block;margin:13px 0 7px;color:#344054;font-weight:850;font-size:13px}
    select,input,textarea{width:100%;border:1px solid #d0d5dd;border-radius:13px;padding:12px;font:inherit}
    textarea{min-height:78px;resize:vertical}
    .chips{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
    .chip input{display:none}
    .chip span{display:block;text-align:center;border:1px solid #d0d5dd;border-radius:999px;padding:9px 7px;background:#fff;color:#344054;font-size:13px;font-weight:800;cursor:pointer}
    .chip input:checked+span{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8}
    .modal-actions{display:grid;grid-template-columns:1fr 1.4fr;gap:8px;margin-top:14px}
    .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#111827;color:#fff;border-radius:999px;padding:11px 15px;font-size:13px;font-weight:850;display:none}
    .toast.show{display:block}
    @media(max-width:720px){
      header{display:block}.mode{display:inline-flex;margin-top:10px}.stats{grid-template-columns:repeat(2,1fr)}.btns{grid-template-columns:1fr}.row{grid-template-columns:1fr}.row .actions{display:grid;grid-template-columns:1fr 1fr;gap:7px}.two{grid-template-columns:1fr}.chips{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="branch">롯데하이마트 삼천포점</div>
        <h1>방문고객 기록</h1>
        <p>입점 등록 후 현재 방문 중 리스트에서 퇴점 처리까지 진행합니다.</p>
      </div>
      <div class="mode" id="modeLabel">연결 확인 중</div>
    </header>

    <section class="card">
      <button class="main-btn" id="checkInBtn">입점 등록</button>
      <div class="btns">
        <button class="btn" id="refreshBtn">새로고침</button>
        <button class="btn" id="pingBtn">연결 테스트</button>
        <button class="btn" id="csvBtn">CSV 다운로드</button>
        <button class="btn danger" id="resetBtn">오늘 초기화</button>
      </div>
      <div class="status" id="status">연결 상태 확인 중입니다.</div>
    </section>

    <section class="stats">
      <div class="stat"><small>오늘 방문</small><strong id="total">0</strong></div>
      <div class="stat"><small>방문 중</small><strong id="activeCount">0</strong></div>
      <div class="stat"><small>퇴점 완료</small><strong id="closed">0</strong></div>
      <div class="stat"><small>구매 전환율</small><strong id="conversion">0%</strong></div>
    </section>

    <section class="card">
      <div class="head">
        <div>
          <h2>현재 매장 방문 중</h2>
          <p>퇴점 처리 또는 입점 취소를 할 수 있습니다.</p>
        </div>
        <span class="badge" id="activeBadge">0명</span>
      </div>
      <div class="list" id="activeList"></div>
    </section>

    <section class="card">
      <div class="head">
        <div>
          <h2>오늘 입점·퇴점 타임라인</h2>
          <p>Google Sheets 기준으로 표시됩니다.</p>
        </div>
      </div>
      <div class="list" id="timeline"></div>
    </section>

    <section class="card">
      <h2>오늘 누적 현황</h2>
      <div class="two">
        <table class="mini">
          <thead><tr><th>미구매 사유</th><th>건수</th></tr></thead>
          <tbody id="reasonTable"></tbody>
        </table>
        <table class="mini">
          <thead><tr><th>상담품목</th><th>건수</th></tr></thead>
          <tbody id="itemTable"></tbody>
        </table>
      </div>
    </section>
  </div>

  <dialog id="checkoutDialog">
    <form class="modal" id="checkoutForm" method="dialog">
      <h3>퇴점 처리</h3>
      <p id="checkoutInfo">상담 결과를 입력해주세요.</p>
      <input type="hidden" id="visitId">

      <label>상담품목 최대 5개</label>
      <div class="chips" id="itemChips"></div>

      <div id="otherItemBox" style="display:none">
        <label>기타 상담품목</label>
        <input id="otherItem" placeholder="예: 전기레인지">
      </div>

      <label>구매 여부</label>
      <select id="purchaseYN">
        <option value="Y">구매 Y</option>
        <option value="N">미구매 N</option>
      </select>

      <div id="reasonBox" style="display:none">
        <label>미구매 사유</label>
        <select id="reason">
          <option value="">선택하세요</option>
          <option>단순 방문</option>
          <option>가격 비교</option>
          <option>온라인 구매 예정</option>
          <option>가족 협의</option>
          <option>구매 보류</option>
          <option>재고 없음</option>
          <option>혜택 부족</option>
          <option>설치 일정</option>
          <option>미진열</option>
          <option>디자인불만족</option>
          <option>기존가전수리</option>
          <option>신제품출시대기</option>
          <option>기타</option>
        </select>
      </div>

      <div id="otherReasonBox" style="display:none">
        <label>기타 사유</label>
        <input id="otherReason" placeholder="미구매 사유를 직접 입력">
      </div>

      <label>메모</label>
      <textarea id="memo" placeholder="상담 내용 또는 재방문 예정 등"></textarea>

      <div class="modal-actions">
        <button type="button" class="btn" id="closeBtn">취소</button>
        <button type="submit" class="btn dark">퇴점 저장</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast">완료</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzcP_d2komxCYMe8a98FgFqKBIrbQSfaCWLvze0CYd_ZtY3-HtIrW5NQzmRxkXaCU8/exec";
const BRANCH_NAME = "삼천포점";
const ITEMS = ["TV","냉장고","김치냉장고","세탁기/건조기","에어컨","선풍기","청소기","로봇청소기","정수기","의류관리기","휴대폰","PC/IT","생활가전","기타"];

let state = {
  branch: BRANCH_NAME,
  records: [],
  active: [],
  summary: { total:0, closed:0, sold:0, conversion:0, reasonCounts:{}, itemCounts:{} }
};

const $ = id => document.getElementById(id);

function setStatus(type, text) {
  $("status").className = "status " + (type || "");
  $("status").textContent = text;
}

function toast(text) {
  $("toast").textContent = text;
  $("toast").classList.add("show");
  setTimeout(() => $("toast").classList.remove("show"), 1500);
}

function setBusy(busy) {
  ["checkInBtn","refreshBtn","pingBtn","csvBtn","resetBtn"].forEach(id => $(id).disabled = busy);
}

function pad(n) { return String(n).padStart(2,"0"); }
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function nowISO() { return new Date().toISOString(); }
function clock(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function dateLabel(date) {
  const p = String(date || todayKey()).split("-");
  return p.length === 3 ? `${p[1]}월 ${p[2]}일` : date;
}

function canUseNetwork() {
  const host = location.hostname || "";
  if (!API_URL.startsWith("https://script.google.com/")) return false;
  if (location.protocol === "file:" || location.protocol === "blob:") return false;
  if (host.includes("chatgpt.com") || host.includes("openai.com") || host.includes("sandbox")) return false;
  if (host === "localhost" || host === "127.0.0.1") return false;
  return true;
}

function jsonp(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Date.now() + "_" + Math.random().toString(16).slice(2);
    const url = new URL(API_URL);
    url.searchParams.set("callback", cb);
    url.searchParams.set("action", action);
    url.searchParams.set("branch", BRANCH_NAME);
    url.searchParams.set("_t", Date.now());

    Object.entries(params).forEach(([k,v]) => {
      url.searchParams.set(k, Array.isArray(v) ? v.join("|") : (v ?? ""));
    });

    const script = document.createElement("script");
    let done = false;

    function cleanup() {
      delete window[cb];
      script.remove();
    }

    const timer = setTimeout(() => {
      if (done) return;
      done = true;
      cleanup();
      reject(new Error("Apps Script 응답 시간이 초과되었습니다. 웹앱 배포 권한 또는 URL을 확인해주세요."));
    }, 20000);

    window[cb] = res => {
      if (done) return;
      done = true;
      clearTimeout(timer);
      cleanup();
      if (!res || !res.ok) reject(new Error(res?.error || "Apps Script 응답 오류"));
      else resolve(res.data);
    };

    script.onerror = () => {
      if (done) return;
      done = true;
      clearTimeout(timer);
      cleanup();
      reject(new Error("Apps Script 연결에 실패했습니다. ping 주소가 pong을 반환하는지 확인해주세요."));
    };

    script.src = url.toString();
    script.async = true;
    document.body.appendChild(script);
  });
}

async function callApi(action, params = {}) {
  if (!canUseNetwork()) throw new Error("GitHub Pages 주소에서 접속해야 Google Sheets에 연결됩니다.");
  return jsonp(action, params);
}

async function ping() {
  try {
    setBusy(true);
    setStatus("warn", "Apps Script 연결 테스트 중...");
    const data = await callApi("ping");
    setStatus("ok", "연결 성공\nmessage: " + data.message + "\nspreadsheetId: " + data.spreadsheetId);
    toast("연결 성공");
  } catch (e) {
    setStatus("err", "연결 테스트 실패: " + e.message);
    alert("연결 테스트 실패: " + e.message);
  } finally {
    setBusy(false);
  }
}

async function refresh() {
  if (!canUseNetwork()) {
    $("modeLabel").textContent = "연결 확인 필요";
    setStatus("warn", "GitHub Pages 주소에서 접속해야 Google Sheets에 연결됩니다.");
    render();
    return;
  }

  try {
    setBusy(true);
    setStatus("warn", "Google Sheets 데이터 불러오는 중...");
    state = await callApi("summary");
    $("modeLabel").textContent = "Google Sheets 실시간 누적";
    setStatus("ok", `Google Sheets 연결 완료. 현재 방문 중 ${(state.active || []).length}명`);
    render();
  } catch (e) {
    setStatus("err", "새로고침 실패: " + e.message);
  } finally {
    setBusy(false);
  }
}

async function checkIn() {
  const tempId = "temp_" + Date.now();
  const temp = {
    id: tempId,
    date: todayKey(),
    visitNo: (state.records || []).length + 1,
    branch: BRANCH_NAME,
    checkInAt: nowISO(),
    checkOutAt: "",
    status: "방문중",
    items: [],
    purchaseYN: "",
    reason: "",
    otherReason: "",
    memo: "",
    syncing: true
  };

  state.records = [...(state.records || []), temp];
  state.active = [...(state.active || []), temp];
  state.summary.total = (state.summary.total || 0) + 1;
  render();
  setStatus("warn", "입점 기록 저장 중...");

  try {
    setBusy(true);
    const data = await callApi("checkin", { userAgent:navigator.userAgent });
    if (!data.persisted) throw new Error("Apps Script가 저장 성공을 확인하지 못했습니다.");
    state = data.summary;
    render();
    setStatus("ok", `입점 ${data.visitNo}번 저장 완료`);
    toast("입점 등록 완료");
  } catch(e) {
    state.records = (state.records || []).filter(r => r.id !== tempId);
    state.active = (state.active || []).filter(r => r.id !== tempId);
    state.summary.total = Math.max(0, (state.summary.total || 1) - 1);
    render();
    setStatus("err", "입점 등록 실패: " + e.message);
    alert("입점 등록 실패: " + e.message);
  } finally {
    setBusy(false);
  }
}

function openCheckout(id) {
  const r = (state.records || []).find(x => x.id === id);
  if (!r || r.syncing) return toast("저장 완료 후 처리 가능합니다.");

  $("visitId").value = id;
  $("checkoutInfo").textContent = `방문 ${r.visitNo}번 · 입점 ${clock(r.checkInAt)}`;
  document.querySelectorAll("input[name='items']").forEach(x => x.checked = false);
  $("purchaseYN").value = "Y";
  $("reason").value = "";
  $("otherReason").value = "";
  $("otherItem").value = "";
  $("memo").value = "";
  syncForm();
  $("checkoutDialog").showModal();
}

async function submitCheckout(e) {
  e.preventDefault();

  const id = $("visitId").value;
  const checked = [...document.querySelectorAll("input[name='items']:checked")].map(x => x.value);
  const otherItem = $("otherItem").value.trim();
  const items = checked.map(x => x === "기타" ? "기타: " + otherItem : x);
  const purchaseYN = $("purchaseYN").value;
  const reason = purchaseYN === "N" ? $("reason").value : "";
  const otherReason = reason === "기타" ? $("otherReason").value.trim() : "";

  if (checked.length === 0) return alert("상담품목을 1개 이상 선택해주세요.");
  if (checked.includes("기타") && !otherItem) return alert("기타 상담품목을 입력해주세요.");
  if (purchaseYN === "N" && !reason) return alert("미구매 사유를 선택해주세요.");
  if (reason === "기타" && !otherReason) return alert("기타 사유를 입력해주세요.");

  try {
    setBusy(true);
    state = await callApi("checkout", { id, items, purchaseYN, reason, otherReason, memo:$("memo").value.trim() });
    $("checkoutDialog").close();
    render();
    setStatus("ok", "퇴점 저장 완료");
    toast("퇴점 저장 완료");
  } catch(e) {
    setStatus("err", "퇴점 저장 실패: " + e.message);
    alert("퇴점 저장 실패: " + e.message);
  } finally {
    setBusy(false);
  }
}

async function cancelVisit(id) {
  if (!confirm("실수로 등록한 입점을 취소할까요?")) return;
  try {
    setBusy(true);
    state = await callApi("cancel", { id });
    render();
    setStatus("ok", "입점 취소 완료");
  } catch(e) {
    setStatus("err", "입점 취소 실패: " + e.message);
    alert("입점 취소 실패: " + e.message);
  } finally {
    setBusy(false);
  }
}

async function resetToday() {
  if (!confirm("오늘 기록을 전체 초기화할까요?")) return;
  if (prompt("실수 방지를 위해 '초기화'라고 입력해주세요.") !== "초기화") return;
  try {
    setBusy(true);
    state = await callApi("resetToday");
    render();
    setStatus("ok", "오늘 기록 초기화 완료");
  } catch(e) {
    setStatus("err", "초기화 실패: " + e.message);
    alert("초기화 실패: " + e.message);
  } finally {
    setBusy(false);
  }
}

function buildChips() {
  const box = $("itemChips");
  box.innerHTML = "";
  ITEMS.forEach(item => {
    const label = document.createElement("label");
    label.className = "chip";
    label.innerHTML = `<input type="checkbox" name="items" value="${item}"><span>${item}</span>`;
    label.querySelector("input").addEventListener("change", ev => {
      const checked = [...document.querySelectorAll("input[name='items']:checked")];
      if (checked.length > 5) {
        ev.target.checked = false;
        toast("상담품목은 최대 5개입니다.");
      }
      syncForm();
    });
    box.appendChild(label);
  });
}

function syncForm() {
  const items = [...document.querySelectorAll("input[name='items']:checked")].map(x => x.value);
  const isOtherItem = items.includes("기타");
  $("otherItemBox").style.display = isOtherItem ? "block" : "none";

  const isNo = $("purchaseYN").value === "N";
  $("reasonBox").style.display = isNo ? "block" : "none";
  const isOtherReason = isNo && $("reason").value === "기타";
  $("otherReasonBox").style.display = isOtherReason ? "block" : "none";
}

function render() {
  const s = state.summary || {};
  $("total").textContent = s.total || 0;
  $("activeCount").textContent = (state.active || []).length;
  $("closed").textContent = s.closed || 0;
  $("conversion").textContent = (s.conversion || 0) + "%";
  $("activeBadge").textContent = (state.active || []).length + "명";

  renderActive();
  renderTimeline();
  renderTable("reasonTable", s.reasonCounts, "미구매 기록 없음");
  renderTable("itemTable", s.itemCounts, "상담 기록 없음");
}

function renderActive() {
  const box = $("activeList");
  const active = state.active || [];
  box.innerHTML = "";
  if (active.length === 0) {
    box.innerHTML = `<div class="empty">현재 방문 중인 고객 기록이 없습니다.</div>`;
    return;
  }

  active.slice().reverse().forEach(r => {
    const div = document.createElement("div");
    div.className = "row";
    div.innerHTML = `
      <div>
        <b>방문 ${r.visitNo}번${r.syncing ? " · 저장 중" : ""}</b>
        <span>입점 시간 ${clock(r.checkInAt)}</span>
      </div>
      <div class="actions">
        <button class="btn success" ${r.syncing ? "disabled" : ""}>퇴점 처리</button>
        <button class="btn danger" ${r.syncing ? "disabled" : ""}>입점 취소</button>
      </div>
    `;
    div.querySelector(".success").onclick = () => openCheckout(r.id);
    div.querySelector(".danger").onclick = () => cancelVisit(r.id);
    box.appendChild(div);
  });
}

function renderTimeline() {
  const box = $("timeline");
  const records = state.records || [];
  box.innerHTML = "";
  if (records.length === 0) {
    box.innerHTML = `<div class="empty">오늘 기록이 없습니다.</div>`;
    return;
  }

  records.slice().reverse().forEach(r => {
    const items = (r.items || []).join(" / ");
    const reason = r.purchaseYN === "N" ? (r.reason === "기타" && r.otherReason ? "기타: " + r.otherReason : r.reason) : "";
    const div = document.createElement("div");
    div.className = "row";
    div.innerHTML = `
      <div>
        <b>방문 ${r.visitNo}번 · ${r.status}</b>
        <span>입점 ${clock(r.checkInAt)}${r.checkOutAt ? " · 퇴점 " + clock(r.checkOutAt) : ""}</span>
        <span>${items || "상담품목 미입력"}${r.purchaseYN ? " · 구매 " + r.purchaseYN : ""}${reason ? " · " + reason : ""}</span>
      </div>
    `;
    box.appendChild(div);
  });
}

function renderTable(id, obj, emptyText) {
  const tbody = $(id);
  const rows = Object.entries(obj || {}).sort((a,b) => b[1] - a[1]);
  tbody.innerHTML = "";
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td>${emptyText}</td><td>0</td></tr>`;
    return;
  }
  rows.forEach(([name,count]) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${name}</td><td>${count}</td>`;
    tbody.appendChild(tr);
  });
}

function csvEscape(v) {
  return `"${String(v ?? "").replaceAll('"','""')}"`;
}

function exportCSV() {
  const records = (state.records || []).slice().sort((a,b) => new Date(a.checkInAt) - new Date(b.checkInAt));
  const rowCount = Math.max(33, records.length);
  const rows = [
    ["■ 시간대별 방문고객 현황","","","","","","","점명 :",BRANCH_NAME,""],
    ["","","","","","","","","",""],
    ["구분","날짜","방문시간","상담품목","","","","","구매여부\n(Y/N)","미구매사유"]
  ];

  for (let i=0;i<rowCount;i++) {
    const r = records[i];
    const items = r && Array.isArray(r.items) ? r.items.slice(0,5) : [];
    while (items.length < 5) items.push("");
    const reason = r && r.purchaseYN === "N" ? (r.reason === "기타" && r.otherReason ? "기타: " + r.otherReason : r.reason) : "";
    rows.push([
      i+1,
      r ? dateLabel(r.date) : "",
      r ? clock(r.checkInAt).replace(":","시 ") + "분" : "",
      items[0],items[1],items[2],items[3],items[4],
      r ? (r.purchaseYN || "") : "",
      reason || ""
    ]);
  }

  const csv = "\uFEFF" + rows.map(r => r.map(csvEscape).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `시간대별_방문고객현황_${BRANCH_NAME}_${todayKey()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

$("checkInBtn").onclick = checkIn;
$("refreshBtn").onclick = refresh;
$("pingBtn").onclick = ping;
$("csvBtn").onclick = exportCSV;
$("resetBtn").onclick = resetToday;
$("closeBtn").onclick = () => $("checkoutDialog").close();
$("checkoutForm").onsubmit = submitCheckout;
$("purchaseYN").onchange = syncForm;
$("reason").onchange = syncForm;

buildChips();
render();
refresh();
setInterval(() => { if (canUseNetwork()) refresh(); }, 30000);
</script>
</body>
</html>
